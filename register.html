<!DOCTYPE html>
<html>
<head>
<title> User Event Registration Form </title>
</head>
<body>
<h1> User Event Registration Form </h1>
<form>
<label for="name">Name:</label>
<input type="text" id="name" name="name" required>     <br/>
<label for="email">Email:</label>
<input type="email" id="email" name="email" required>    <br/>
<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone">     <br/>
<label for="organization">Organization:</label>
<input type="text" id="organization" name="organization">   <br/>
<label for="attendee-type">Attendee Type:</label>
<select id="attendee-type" name="attendee-type">
<option value="general">General</option>
<option value="vip">VIP</option>
<option value="speaker">Speaker</option>
</select>
<br><br>
<input type="submit" value="Register">
</form>
</body>
</html>
